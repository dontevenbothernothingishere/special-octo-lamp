<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MASC - Dynamic Master Social</title>
    <style>
        :root { --gold: #d4af37; --bg: #050505; --card: #121212; --text: #f0f0f0; --gray: #666; --border: #222; --red: #e0245e; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background: var(--bg); color: var(--text); padding-bottom: 70px; }

        /* Security Vault */
        #vault-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        .vault-input { background: #111; border: 1px solid var(--gold); color: white; padding: 15px; width: 100%; max-width: 300px; margin: 20px 0; border-radius: 8px; font-family: monospace; }
        
        /* Layout */
        header { background: rgba(5,5,5,0.9); backdrop-filter: blur(10px); padding: 15px; position: sticky; top: 0; border-bottom: 1px solid var(--border); z-index: 100; display: flex; justify-content: space-between; align-items: center; }
        .wallet { color: var(--gold); font-weight: bold; font-size: 1.1em; cursor: pointer; }
        .view { display: none; padding: 10px; max-width: 600px; margin: 0 auto; }
        .view.active { display: block; }

        /* Feed & Posts */
        .feed-controls { display: flex; justify-content: space-between; margin-bottom: 15px; padding: 0 5px; }
        .post { background: var(--card); margin-bottom: 15px; padding: 15px; border-radius: 10px; border: 1px solid var(--border); }
        .post-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .post-author { font-weight: bold; color: var(--gold); }
        .post-handle { color: var(--gray); font-size: 0.9em; font-weight: normal; }
        .post-actions { display: flex; gap: 15px; margin-top: 15px; border-top: 1px solid var(--border); padding-top: 10px; }
        
        /* Buttons */
        .btn-tribute { background: var(--gold); color: black; border: none; padding: 8px 15px; border-radius: 20px; font-weight: bold; cursor: pointer; }
        .btn-outline { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 8px 15px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .btn-danger { background: transparent; border: 1px solid var(--red); color: var(--red); padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 0.8em; }

        /* Loader */
        .loader { color: var(--gold); font-style: italic; text-align: center; padding: 20px; display: none; }

        /* DMs */
        .dm-list-item { padding: 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; cursor: pointer; }
        #chat-view { display: flex; flex-direction: column; height: calc(100vh - 130px); }
        .chat-history { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 10px 15px; border-radius: 15px; line-height: 1.4; }
        .msg.master { background: #222; align-self: flex-start; border-left: 2px solid var(--gold); }
        .msg.sub { background: var(--gold); color: black; align-self: flex-end; }
        .chat-input-area { display: flex; gap: 10px; padding: 10px; background: var(--card); border-top: 1px solid var(--border); }
        .chat-input-area input { flex: 1; background: #111; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 20px; }

        /* Navbar */
        nav { position: fixed; bottom: 0; width: 100%; background: var(--bg); border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 15px 0; z-index: 100; }
        .nav-item { color: var(--gray); font-size: 1.5em; text-decoration: none; cursor: pointer; }
        .nav-item.active { color: var(--gold); }

        /* Notifications */
        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--gold); color: black; padding: 10px 20px; border-radius: 20px; font-weight: bold; z-index: 1000; display: none; text-align: center; }
    </style>
</head>
<body>

<div id="vault-overlay">
    <h1 style="color:var(--gold); margin-bottom: 10px;">MASC VAULT</h1>
    <p style="color:var(--gray); margin-bottom: 20px;">Paste your Groq API Key. <br>Make sure there are no spaces at the end!</p>
    <input type="password" id="api-key" class="vault-input" placeholder="gsk_...">
    <button class="btn-tribute" style="padding: 15px 30px; font-size: 1.1em;" onclick="unlockVault()">Authenticate</button>
</div>

<div class="toast" id="toast">Notification</div>

<header>
    <div style="display:flex; flex-direction:column;">
        <span style="font-weight: 900; letter-spacing: 1px;">MASC</span>
        <button class="btn-danger" style="margin-top:5px;" onclick="resetKey()">Reset API Key</button>
    </div>
    <span class="wallet" onclick="addMoney()">💰 $<span id="wallet-balance">10,000</span></span>
</header>

<div id="view-home" class="view active">
    <div class="feed-controls">
        <b style="color:var(--gold)">Live AI Feed</b>
        <button class="btn-outline" onclick="generateAIPost()">+ Pull New Post</button>
    </div>
    <div id="feed-loader" class="loader">Master is typing a post...</div>
    <div id="feed-container"></div>
</div>

<div id="view-dms" class="view">
    <h2 style="margin-bottom: 15px; color: var(--gold);">Master DMs</h2>
    <div id="dm-list"></div>
</div>

<div id="view-chat" class="view" style="padding: 0; max-width: 100%;">
    <div style="padding: 15px; background: var(--card); border-bottom: 1px solid var(--border);">
        <b id="chat-title" style="color:var(--gold)">Master</b>
        <button onclick="switchTab('dms')" style="float:right; background:none; color:white; border:none; cursor:pointer;">Close</button>
    </div>
    <div id="chat-view">
        <div class="chat-history" id="chat-history"></div>
        <div class="chat-input-area">
            <input type="text" id="chat-input" placeholder="Submit to your Master...">
            <button class="btn-tribute" onclick="sendMsg()">Send</button>
        </div>
    </div>
</div>

<nav>
    <span class="nav-item active" onclick="switchTab('home')">🏠 Feed</span>
    <span class="nav-item" onclick="switchTab('dms')">💬 DMs</span>
</nav>

<script>
    // --- DATABASE (The Masters Context) ---
    const masters = [
        { id: 'm1', name: 'Master Jax', handle: '@AlphaJax', bio: 'Gym rat. Demanding. Pays no attention to brats unless they pay.' },
        { id: 'm2', name: 'King Sterling', handle: '@RichSterling', bio: 'Wealthy CEO. Thinks you are beneath him. Only responds to heavy tributes.' },
        { id: 'm3', name: 'Dom Marcus', handle: '@DomMarcus', bio: 'Frat bro dom. Ruthless and cocky. Wants your beer money.' }
    ];

    // --- STATE MANAGEMENT ---
    let state = {
        key: localStorage.getItem('masc_key') || '',
        wallet: parseInt(localStorage.getItem('masc_wallet')) || 10000,
        feed: JSON.parse(localStorage.getItem('masc_feed')) || [], // Dynamic feed storage
        chats: JSON.parse(localStorage.getItem('masc_chats')) || {},
        activeChat: null
    };

    // --- INITIALIZATION ---
    if (state.key) document.getElementById('vault-overlay').style.display = 'none';
    updateWallet(0); 
    renderFeed();
    renderDMList();

    function unlockVault() {
        // .trim() removes any accidental spaces pasted by the user!
        const key = document.getElementById('api-key').value.trim(); 
        if (key.startsWith('gsk_')) {
            localStorage.setItem('masc_key', key);
            state.key = key;
            document.getElementById('vault-overlay').style.display = 'none';
            showToast("Vault Unlocked.");
            if(state.feed.length === 0) generateAIPost(); // Generate first post if empty
        } else {
            alert("Invalid Groq Key format. Must start with 'gsk_'");
        }
    }

    function resetKey() {
        if(confirm("Are you sure you want to delete your API key and log out?")) {
            localStorage.removeItem('masc_key');
            location.reload();
        }
    }

    // --- CORE LOGIC ---
    function switchTab(tabId) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(`view-${tabId}`).classList.add('active');
        
        if(tabId !== 'chat') {
            event.currentTarget.classList.add('active');
        }
        
        if (tabId === 'dms') renderDMList();
        window.scrollTo(0, 0);
    }

    function updateWallet(amount) {
        state.wallet += amount;
        localStorage.setItem('masc_wallet', state.wallet);
        document.getElementById('wallet-balance').innerText = state.wallet.toLocaleString();
    }

    // A cheat code to add money if you go broke
    function addMoney() {
        if(confirm("Work a fictional shift to earn $5,000?")) {
            updateWallet(5000);
        }
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 3000);
    }

    // --- DYNAMIC AI FEED GENERATOR ---
    async function generateAIPost() {
        if (!state.key) { alert("API key missing!"); return; }
        
        document.getElementById('feed-loader').style.display = 'block';
        
        // Pick a random master to write a post
        const master = masters[Math.floor(Math.random() * masters.length)];

        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${state.key}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: "llama3-8b-8192",
                    messages: [
                        { role: "system", content: `You are ${master.name} (${master.handle}). Bio: ${master.bio}. You are a gay male findom on Twitter.` },
                        { role: "user", content: "Write a short, arrogant, demanding tweet telling your submissives to send you money. Include a specific dollar amount you want. Do not use hashtags. Keep it under 200 characters." }
                    ]
                })
            });

            if (!response.ok) {
                if(response.status === 401) throw new Error("API Authentication Failed. Please reset your key.");
                throw new Error("API Error: " + response.status);
            }

            const data = await response.json();
            const postText = data.choices[0].message.content.replace(/["']/g, ""); // Clean up quotes

            // Create new post object
            const newPost = {
                id: Date.now().toString(),
                authorId: master.id,
                content: postText
            };

            // Add to top of feed array and save
            state.feed.unshift(newPost);
            
            // Keep feed array from getting too massive (keep last 20)
            if(state.feed.length > 20) state.feed.pop();
            
            localStorage.setItem('masc_feed', JSON.stringify(state.feed));
            renderFeed();

        } catch (e) {
            alert(e.message);
        } finally {
            document.getElementById('feed-loader').style.display = 'none';
        }
    }

    function customTribute(masterName) {
        const amountStr = prompt(`How much are you tributing to ${masterName}? (Enter numbers only)`);
        if (!amountStr) return;
        
        const amount = parseInt(amountStr);
        if (isNaN(amount) || amount <= 0) {
            alert("Invalid amount.");
            return;
        }

        if (state.wallet >= amount) {
            updateWallet(-amount);
            showToast(`Sent $${amount} to ${masterName}`);
        } else {
            alert("Insufficient fictional funds! You're broke.");
        }
    }

    // --- RENDERERS ---
    function renderFeed() {
        const container = document.getElementById('feed-container');
        if (state.feed.length === 0) {
            container.innerHTML = "<p style='color:var(--gray); text-align:center;'>Feed is empty. Pull a new post!</p>";
            return;
        }

        const html = state.feed.map(post => {
            const master = masters.find(m => m.id === post.authorId) || masters[0];
            return `
                <div class="post">
                    <div class="post-header">
                        <div>
                            <span class="post-author">${master.name}</span>
                            <span class="post-handle">${master.handle}</span>
                        </div>
                    </div>
                    <div style="margin: 10px 0; line-height: 1.4; font-size: 1.1em;">${post.content}</div>
                    <div class="post-actions">
                        <button class="btn-outline" onclick="openChat('${master.id}')">💬 Grovel in DMs</button>
                        <button class="btn-tribute" style="margin-left: auto;" onclick="customTribute('${master.name}')">
                            Send Tribute
                        </button>
                    </div>
                </div>
            `;
        }).join('');
        container.innerHTML = html;
    }

    function renderDMList() {
        // All masters are always available to DM
        const html = masters.map(m => `
            <div class="dm-list-item" onclick="openChat('${m.id}')">
                <div><b style="color:var(--gold)">${m.name}</b> <span style="color:var(--gray)">${m.handle}</span></div>
                <span style="color:var(--gray)">Chat ➡️</span>
            </div>
        `).join('');
        document.getElementById('dm-list').innerHTML = html;
    }

    // --- AI CHAT SYSTEM ---
    function openChat(masterId) {
        state.activeChat = masters.find(m => m.id === masterId);
        document.getElementById('chat-title').innerText = state.activeChat.name;
        switchTab('chat');
        renderChatHistory();
    }

    function renderChatHistory() {
        const history = state.chats[state.activeChat.id] || [];
        const box = document.getElementById('chat-history');
        box.innerHTML = history.map(msg => `
            <div class="msg ${msg.role === 'user' ? 'sub' : 'master'}">
                ${msg.content}
            </div>
        `).join('');
        box.scrollTop = box.scrollHeight;
    }

    async function sendMsg() {
        const input = document.getElementById('chat-input');
        const text = input.value.trim();
        if (!text || !state.activeChat) return;

        // Save User Msg
        if (!state.chats[state.activeChat.id]) state.chats[state.activeChat.id] = [];
        state.chats[state.activeChat.id].push({ role: 'user', content: text });
        input.value = '';
        renderChatHistory();

        // Call Groq
        try {
            const systemPrompt = `You are ${state.activeChat.name}, a dominant alpha male findom. Bio: ${state.activeChat.bio}. You are talking to your gay male submissive in the DMs. Be arrogant, demanding, and demean him for his money. Ask for specific amounts of tribute. NEVER act like an AI. Keep responses under 3 sentences.`;
            
            const apiMessages = [{ role: 'system', content: systemPrompt }];
            state.chats[state.activeChat.id].slice(-6).forEach(m => {
                apiMessages.push({ role: m.role === 'user' ? 'user' : 'assistant', content: m.content });
            });

            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${state.key}`, "Content-Type": "application/json" },
                body: JSON.stringify({ model: "llama3-8b-8192", messages: apiMessages })
            });
            
            if (!response.ok) throw new Error("API Error");

            const data = await response.json();
            const reply = data.choices[0].message.content;

            // Save Master Msg
            state.chats[state.activeChat.id].push({ role: 'master', content: reply });
            localStorage.setItem('masc_chats', JSON.stringify(state.chats));
            renderChatHistory();

        } catch (e) {
            showToast("Failed to connect to Master.");
        }
    }
</script>
</body>
</html>
