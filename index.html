<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MASC GLOBAL - High Roller Edition</title>
    <style>
        :root { --gold: #d4af37; --bg: #050505; --card: #111; --text: #fafafa; --gray: #888; --border: #222; --red: #ff3333; --blue: #3498db; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); padding-bottom: 90px; overflow-x: hidden; }

        /* Vault */
        #vault-overlay { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; text-align: center; }
        .vault-input { background: #111; border: 1px solid var(--gold); color: white; padding: 15px; width: 100%; max-width: 350px; margin: 20px 0; border-radius: 12px; font-size: 16px; text-align: center; }

        /* UI */
        header { background: rgba(0,0,0,0.95); backdrop-filter: blur(20px); padding: 15px; position: sticky; top: 0; border-bottom: 1px solid var(--border); z-index: 1000; display: flex; justify-content: space-between; align-items: center; }
        .wallet-display { color: var(--gold); font-weight: 900; font-size: 1.1em; text-shadow: 0 0 10px rgba(212,175,55,0.4); }
        .view { display: none; padding: 15px; max-width: 600px; margin: 0 auto; animation: fadeIn 0.3s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Cards */
        .post { background: var(--card); border-radius: 16px; padding: 16px; margin-bottom: 20px; border: 1px solid var(--border); }
        .m-name { color: var(--gold); font-weight: 800; font-size: 1.1em; }
        .m-handle { color: var(--gray); font-size: 0.85em; }
        .post-content { font-size: 1.05em; line-height: 1.5; margin: 12px 0; }
        .post-actions { display: flex; gap: 20px; border-top: 1px solid #222; padding-top: 12px; margin-top: 10px; }
        .action-btn { color: var(--gray); font-size: 0.9em; cursor: pointer; display: flex; align-items: center; gap: 5px; }
        .action-btn.active { color: var(--red); }

        /* Work / Task System */
        .work-card { background: #1a1a1a; border: 1px solid var(--blue); padding: 20px; border-radius: 15px; text-align: center; margin-top: 20px; }
        .task-input { width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 8px; margin-top: 10px; font-size: 1em; }

        /* DM System */
        #chat-window { height: 60vh; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 18px; line-height: 1.4; }
        .msg.master { background: #222; align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid #333; }
        .msg.sub { background: var(--gold); color: #000; align-self: flex-end; border-bottom-right-radius: 2px; font-weight: 600; }
        .chat-input-row { position: fixed; bottom: 80px; width: 100%; left: 0; background: #000; padding: 12px; display: flex; gap: 8px; border-top: 1px solid var(--border); }
        .chat-input-row input { flex: 1; background: #111; border: 1px solid #333; color: white; padding: 12px; border-radius: 25px; outline: none; }

        /* Buttons */
        .btn-gold { background: var(--gold); color: #000; border: none; padding: 10px 20px; border-radius: 30px; font-weight: 900; cursor: pointer; }
        .btn-outline { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 8px 16px; border-radius: 30px; font-weight: bold; cursor: pointer; font-size: 0.8em; }

        /* Nav */
        nav { position: fixed; bottom: 0; width: 100%; background: #000; border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 18px 0; z-index: 1000; }
        .nav-btn { color: var(--gray); font-size: 1.5em; cursor: pointer; }
        .nav-btn.active { color: var(--gold); transform: translateY(-3px); }

        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--gold); color: black; padding: 10px 25px; border-radius: 30px; font-weight: bold; z-index: 10001; display: none; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<div id="vault-overlay">
    <h1 style="color:var(--gold); letter-spacing: 5px;">MASC GLOBAL</h1>
    <p style="color:var(--gray); margin-top: 10px;">Security: Llama-3.3-70b Engine</p>
    <input type="password" id="api-key" class="vault-input" placeholder="Paste Groq Key...">
    <button class="btn-gold" onclick="unlock()">ACCESS TERMINAL</button>
</div>

<div class="toast" id="toast"></div>

<header>
    <div style="font-weight: 900; letter-spacing: 2px;">MASC</div>
    <div class="wallet-display">💰 $<span id="balance">0</span></div>
</header>

<div id="view-home" class="view active">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
        <h2 style="font-size: 1.4em;">Feed</h2>
        <button class="btn-outline" onclick="generatePost()">+ Pull Post</button>
    </div>
    <div id="feed-container"></div>
</div>

<div id="view-search" class="view">
    <h2>Earn Fictional Capital</h2>
    <p style="color:var(--gray); font-size: 0.9em; margin-bottom: 20px;">The Masters don't give handouts. Work for it.</p>
    
    <div class="work-card">
        <h3 style="color:var(--blue)">Shift: Data Submission</h3>
        <p style="font-size: 0.85em; color: #aaa; margin: 10px 0;" id="work-instruction">Type the phrase below to earn $250.</p>
        <div id="target-phrase" style="background:#000; padding:10px; border-radius:5px; font-family:monospace; color:var(--gold); margin-bottom:10px;">I am a loyal sub.</div>
        <input type="text" id="work-input" class="task-input" placeholder="Type here..." onkeyup="checkWork()">
    </div>

    <h2 style="margin-top: 40px;">Search Masters</h2>
    <input type="text" id="m-search" class="vault-input" style="margin-bottom:10px; width:100%;" placeholder="Search names..." onkeyup="renderMasters()">
    <div id="master-results"></div>
</div>

<div id="view-dms" class="view">
    <h2 style="margin-bottom: 20px;">The inner circle</h2>
    <div id="dm-list"></div>
</div>

<div id="view-chat" class="view" style="padding: 0; max-width: 100%;">
    <div style="padding: 15px; border-bottom: 1px solid var(--border); display:flex; align-items:center; justify-content:space-between;">
        <b id="chat-master-name" style="color:var(--gold)">Master</b>
        <button onclick="switchTab('dms')" style="background:none; color:white; border:none; font-size: 1.5em;">×</button>
    </div>
    <div id="chat-window"></div>
    <div class="chat-input-row">
        <input type="text" id="chat-input" placeholder="Grovel here...">
        <button class="btn-gold" onclick="sendDM()">Send</button>
    </div>
</div>

<nav>
    <span class="nav-btn active" id="n-home" onclick="switchTab('home')">📱</span>
    <span class="nav-btn" id="n-search" onclick="switchTab('search')">🛠️</span>
    <span class="nav-btn" id="n-dms" onclick="switchTab('dms')">💬</span>
    <span class="nav-btn" onclick="reset()">🔒</span>
</nav>

<script>
    const MODEL = "llama-3.3-70b-versatile";

    // EXPANDED MASTER LIST
    let masters = JSON.parse(localStorage.getItem('m_global_masters')) || [
        { id: 'sap', name: 'Sapnap', handle: '@Sapnap', bio: 'Aggressive, competitive, masculine gamer. Doesn’t play around.', stats: { tribute: 0, followed: false } },
        { id: 'mal', name: 'Malachi Barton', handle: '@MalachiB', bio: 'Pretty boy energy. Arrogant, charming, but cold.', stats: { tribute: 0, followed: false } },
        { id: 'roi', name: 'Roier', handle: '@Roier', bio: 'Mexican Master. Mixes Spanish and English. Extremely charismatic and demanding.', lang: 'Spanglish', stats: { tribute: 0, followed: false } },
        { id: 'cel', name: 'Cellbit', handle: '@Cellbit', bio: 'Brazilian Master. Genius, cold, investigator vibe. Mixes Portuguese and English.', lang: 'Portunglish', stats: { tribute: 0, followed: false } },
        { id: 'jos', name: 'Josh Hutcherson', handle: '@JoshH', bio: 'Masc, boy-next-door turned Alpha. Demands respect and tributes.', stats: { tribute: 0, followed: false } }
    ];

    let state = {
        key: localStorage.getItem('m_global_key') || '',
        wallet: parseInt(localStorage.getItem('m_global_wallet')) || 1000,
        feed: JSON.parse(localStorage.getItem('m_global_feed')) || [],
        chats: JSON.parse(localStorage.getItem('m_global_chats')) || {},
        likes: JSON.parse(localStorage.getItem('m_global_likes')) || [],
        activeM: null,
        workPhrase: ""
    };

    if (state.key) document.getElementById('vault-overlay').style.display = 'none';
    refreshUI();
    setNewWork();

    function unlock() {
        const k = document.getElementById('api-key').value.trim();
        if (k.startsWith('gsk_')) {
            state.key = k;
            localStorage.setItem('m_global_key', k);
            document.getElementById('vault-overlay').style.display = 'none';
            if(state.feed.length === 0) generatePost();
        }
    }

    function switchTab(t) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('active'));
        document.getElementById(`view-${t}`).classList.add('active');
        if(t !== 'chat') document.getElementById(`n-${t}`).classList.add('active');
        if(t === 'home') renderFeed();
        if(t === 'search') renderMasters();
        if(t === 'dms') renderDMList();
    }

    function refreshUI() {
        document.getElementById('balance').innerText = state.wallet.toLocaleString();
        localStorage.setItem('m_global_wallet', state.wallet);
        localStorage.setItem('m_global_masters', JSON.stringify(masters));
        localStorage.setItem('m_global_feed', JSON.stringify(state.feed));
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg; t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 3000);
    }

    // --- WORK SYSTEM ---
    function setNewWork() {
        const phrases = ["I live to serve the Masters.", "My wallet is not my own.", "Tribute is the only way.", "Obedience is mandatory.", "I am nothing without them."];
        state.workPhrase = phrases[Math.floor(Math.random() * phrases.length)];
        document.getElementById('target-phrase').innerText = state.workPhrase;
    }

    function checkWork() {
        const inp = document.getElementById('work-input');
        if (inp.value === state.workPhrase) {
            state.wallet += 250;
            inp.value = "";
            showToast("Earned $250! Shift complete.");
            setNewWork();
            refreshUI();
        }
    }

    // --- SOCIAL LOGIC ---
    function toggleFollow(id) {
        const m = masters.find(x => x.id === id);
        m.stats.followed = !m.stats.followed;
        refreshUI();
        renderMasters();
        renderFeed();
    }

    async function generatePost() {
        if(!state.key) return;
        const m = masters[Math.floor(Math.random() * masters.length)];
        showToast(`${m.name} is thinking...`);

        try {
            let prompt = `You are ${m.name}. Persona: ${m.bio}. You are a gay male findom. `;
            if(m.lang === 'Spanglish') prompt += "Mix Spanish words like 'pendejo', 'mi amor', 'dinero', 'guey' into your English naturally. ";
            if(m.lang === 'Portunglish') prompt += "Mix Portuguese words like 'meu bem', 'dinheiro', 'garoto' into your English naturally. ";
            prompt += "Write a short, unpredictable tweet. It could be an insult, a demand for money, or just showing off your lifestyle. Keep it under 200 characters.";

            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${state.key}`, "Content-Type": "application/json" },
                body: JSON.stringify({ model: MODEL, messages: [{ role: "system", content: prompt }] })
            });
            const data = await res.json();
            const post = { id: Date.now(), masterId: m.id, content: data.choices[0].message.content, comments: [] };
            state.feed.unshift(post);
            if(state.feed.length > 20) state.feed.pop();
            renderFeed();
            refreshUI();
        } catch (e) { console.error(e); }
    }

    function renderFeed() {
        const container = document.getElementById('feed-container');
        container.innerHTML = state.feed.map(p => {
            const m = masters.find(x => x.id === p.masterId);
            const liked = state.likes.includes(p.id);
            return `
                <div class="post">
                    <div style="display:flex; justify-content:space-between;">
                        <div><span class="m-name">${m.name}</span><span class="m-handle">${m.handle}</span></div>
                        <button class="btn-outline" onclick="toggleFollow('${m.id}')">${m.stats.followed ? 'Following' : 'Follow'}</button>
                    </div>
                    <div class="post-content">${p.content}</div>
                    <div class="post-actions">
                        <div class="action-btn ${liked?'active':''}" onclick="toggleLike(${p.id})">❤️</div>
                        <div class="action-btn" onclick="addComment(${p.id})">💬</div>
                        <button class="btn-gold" style="margin-left:auto; padding:5px 12px; font-size:0.8em;" onclick="tribute('${m.id}')">Tribute</button>
                    </div>
                    <div id="comments-${p.id}" style="font-size:0.85em; margin-top:10px;">
                        ${p.comments.map(c => `<div style="margin-top:5px;"><b>${c.user}:</b> ${c.text}</div>`).join('')}
                    </div>
                </div>
            `;
        }).join('');
    }

    function toggleLike(id) {
        if(state.likes.includes(id)) state.likes = state.likes.filter(x => x!==id);
        else state.likes.push(id);
        localStorage.setItem('m_global_likes', JSON.stringify(state.likes));
        renderFeed();
    }

    function tribute(id) {
        const m = masters.find(x => x.id === id);
        const amt = prompt(`Tribute amount for ${m.name}:`);
        if(!amt || isNaN(amt) || amt <= 0) return;
        if(state.wallet >= amt) {
            state.wallet -= parseInt(amt);
            m.stats.tribute += parseInt(amt);
            showToast(`Master ${m.name} received your $${amt}.`);
            refreshUI();
        } else {
            alert("Insufficient funds. Go to the 🛠️ tab to work.");
        }
    }

    async function addComment(postId) {
        const text = prompt("Write a comment...");
        if(!text) return;
        const post = state.feed.find(x => x.id === postId);
        const m = masters.find(x => x.id === post.masterId);
        post.comments.push({ user: 'You', text: text });
        renderFeed();

        try {
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${state.key}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: MODEL,
                    messages: [
                        { role: "system", content: `You are ${m.name}. User Tribute Total: $${m.stats.tribute}. Reply to their comment on your post. Keep it short and arrogant. If tribute is $0, be very mean.` },
                        { role: "user", content: text }
                    ]
                })
            });
            const data = await res.json();
            post.comments.push({ user: m.name, text: data.choices[0].message.content });
            renderFeed();
            refreshUI();
        } catch (e) {}
    }

    // --- DM SYSTEM ---
    function renderDMList() {
        const container = document.getElementById('dm-list');
        const followed = masters.filter(m => m.stats.followed);
        if(followed.length === 0) {
            container.innerHTML = "<p style='color:var(--gray)'>Follow someone to see them here.</p>";
            return;
        }
        container.innerHTML = followed.map(m => `
            <div class="post" onclick="openChat('${m.id}')" style="cursor:pointer;">
                <b style="color:var(--gold)">${m.name}</b>
                <p style="font-size:0.8em; color:var(--gray)">Total Tribute: $${m.stats.tribute}</p>
            </div>
        `).join('');
    }

    function openChat(id) {
        state.activeM = masters.find(x => x.id === id);
        document.getElementById('chat-master-name').innerText = state.activeM.name;
        switchTab('chat');
        renderMsgs();
    }

    function renderMsgs() {
        const h = state.chats[state.activeM.id] || [];
        const win = document.getElementById('chat-window');
        win.innerHTML = h.map(m => `<div class="msg ${m.role==='user'?'sub':'master'}">${m.content}</div>`).join('');
        win.scrollTop = win.scrollHeight;
    }

    async function sendDM() {
        const inp = document.getElementById('chat-input');
        const val = inp.value.trim();
        if(!val) return;
        const m = state.activeM;
        if(!state.chats[m.id]) state.chats[m.id] = [];
        state.chats[m.id].push({ role: 'user', content: val });
        inp.value = '';
        renderMsgs();

        try {
            let sys = `You are ${m.name}. Persona: ${m.bio}. User's Tribute History: $${m.stats.tribute}. `;
            if(m.lang === 'Spanglish') sys += "Mix Spanish/English. ";
            if(m.lang === 'Portunglish') sys += "Mix Portuguese/English. ";
            sys += "You are talking to a gay submissive. Be short, cold, and demanding.";

            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${state.key}`, "Content-Type": "application/json" },
                body: JSON.stringify({ model: MODEL, messages: [{ role: "system", content: sys }, ...state.chats[m.id].slice(-6)] })
            });
            const data = await res.json();
            state.chats[m.id].push({ role: 'assistant', content: data.choices[0].message.content });
            localStorage.setItem('m_global_chats', JSON.stringify(state.chats));
            renderMsgs();
        } catch (e) { alert("API Connection lost."); }
    }

    function renderMasters() {
        const q = document.getElementById('m-search').value.toLowerCase();
        const res = document.getElementById('master-results');
        res.innerHTML = masters.filter(m => m.name.toLowerCase().includes(q))
            .map(m => `
                <div class="post" style="display:flex; justify-content:space-between; align-items:center;">
                    <div><b>${m.name}</b><br><small>${m.handle}</small></div>
                    <button class="btn-outline" onclick="toggleFollow('${m.id}')">${m.stats.followed ? 'Unfollow' : 'Follow'}</button>
                </div>
            `).join('');
    }

    function reset() { if(confirm("Log out?")) { localStorage.clear(); location.reload(); } }
</script>
</body>
</html>
