<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MASC: EROTIC PROTOCOL</title>
    <style>
        :root { --hot-pink: #ff007f; --deep-purple: #1a001a; --gold: #d4af37; --bg: #000; --text: #f0f0f0; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Verdana', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); padding-bottom: 90px; overflow: hidden; }

        header { padding: 15px; border-bottom: 1px solid var(--hot-pink); display: flex; justify-content: space-between; background: #050505; box-shadow: 0 0 15px var(--hot-pink); }
        .wallet { color: var(--gold); font-weight: bold; text-shadow: 0 0 5px var(--gold); }

        .view { display: none; padding: 15px; height: 85vh; overflow-y: auto; }
        .view.active { display: block; }

        /* SESSION BOX */
        .session-container { background: var(--deep-purple); border: 2px solid var(--hot-pink); border-radius: 10px; padding: 20px; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: space-between; }
        .master-command { font-style: italic; color: var(--hot-pink); text-align: center; font-size: 1.2em; line-height: 1.4; margin-bottom: 20px; text-shadow: 0 0 10px #000; }
        
        .pleasure-btn { width: 150px; height: 150px; border-radius: 50%; background: linear-gradient(45deg, var(--hot-pink), #800040); border: 5px solid #fff; box-shadow: 0 0 30px var(--hot-pink); display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; cursor: pointer; text-align: center; transition: 0.2s; }
        .pleasure-btn:active { transform: scale(0.9); box-shadow: 0 0 10px var(--hot-pink); }

        /* POSTS */
        .post { background: #0a0a0a; border-left: 5px solid var(--hot-pink); padding: 15px; margin-bottom: 15px; border-top: 1px solid #222; }
        .m-name { color: var(--hot-pink); font-weight: bold; font-size: 1.1em; }
        .p-content { margin: 10px 0; color: #fff; line-height: 1.5; font-size: 1.05em; }

        /* CHAT */
        #chat-flow { height: 60vh; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 85%; padding: 15px; border-radius: 12px; font-size: 1em; line-height: 1.4; }
        .msg.master { background: #1a001a; border: 1px solid var(--hot-pink); align-self: flex-start; color: #ff99cc; }
        .msg.sub { background: #222; align-self: flex-end; color: #ccc; }

        .chat-input { position: fixed; bottom: 70px; width: 100%; display: flex; padding: 10px; background: #000; border-top: 2px solid var(--hot-pink); }
        .chat-input input { flex: 1; background: #111; border: 1px solid #333; color: white; padding: 15px; border-radius: 30px; outline: none; }

        /* NAV */
        nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 20px 0; border-top: 1px solid #333; }
        .nav-item { color: #666; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 0.8em; }
        .nav-item.active { color: var(--hot-pink); text-shadow: 0 0 8px var(--hot-pink); }

        .btn-gold { background: var(--gold); color: #000; border: none; padding: 10px; font-weight: bold; width: 100%; margin-top: 10px; cursor: pointer; }
        
        #auth { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .key-in { background: #0a0a0a; border: 1px solid var(--hot-pink); color: white; padding: 15px; width: 80%; text-align: center; margin: 20px; }
    </style>
</head>
<body>

<div id="auth">
    <h1 style="color:var(--hot-pink); text-shadow: 0 0 20px var(--hot-pink);">EROTIC_CORE</h1>
    <input type="password" id="api-key" class="key-in" placeholder="GROQ API KEY">
    <button class="btn-gold" style="width: 200px;" onclick="unlock()">INICIAR VÍNCULO</button>
</div>

<header>
    <div style="color:var(--hot-pink); font-weight: bold;">SESSÃO_ATIVA</div>
    <div class="wallet">SALDO: $<span id="balance">0</span></div>
</header>

<div id="view-session" class="view active">
    <div class="session-container">
        <p style="font-size: 0.7em; color: var(--hot-pink);">O MESTRE ESTÁ TE OBSERVANDO...</p>
        <div id="session-command" class="master-command">Toque no botão para iniciar a exibição...</div>
        
        <div class="pleasure-btn" id="pleasure-trigger" 
             onmousedown="startErotic()" ontouchstart="startErotic()" 
             onmouseup="stopErotic()" ontouchend="stopErotic()">
            SUBMETER CORPO
        </div>
        
        <p id="session-status" style="font-size: 0.9em; color: var(--gold); text-align: center;"></p>
    </div>
</div>

<div id="view-feed" class="view">
    <div id="feed-container"></div>
    <button class="btn-gold" onclick="generateEroticPost()">PULSAR NOVO POST</button>
</div>

<div id="view-dms" class="view">
    <div id="dm-list"></div>
</div>

<div id="view-chat" class="view" style="padding:0;">
    <div style="padding:15px; border-bottom:1px solid var(--hot-pink); font-weight:bold; color:var(--hot-pink)" id="chat-master-name">MASTER</div>
    <div id="chat-flow"></div>
    <div class="chat-input">
        <input type="text" id="chat-msg" placeholder="Rasteje sexualmente...">
        <button class="btn-gold" style="width:60px; margin:0; border-radius:50%" onclick="sendDM()">></button>
    </div>
</div>

<nav>
    <div class="nav-item active" id="n-session" onclick="tab('session')">SESSION</div>
    <div class="nav-item" id="n-feed" onclick="tab('feed')">FEED</div>
    <div class="nav-item" id="n-dms" onclick="tab('dms')">DMS</div>
</nav>

<script>
    const MODEL = "llama-3.3-70b-versatile";
    
    let masters = JSON.parse(localStorage.getItem('me_masters')) || [
        { id: 'sap', name: 'Sapnap', bio: 'Dominante agressivo, focado em controle corporal e humilhação sexual direta.', stats: { tribute: 0, arousal: 0 } },
        { id: 'roi', name: 'Roier', bio: 'Sádico mexicano. Exige que você se toque enquanto ele te xinga em Spanglish.', lang: 'Spanglish', stats: { tribute: 0, arousal: 0 } },
        { id: 'cel', name: 'Cellbit', bio: 'Frio e possessivo. Trata seu prazer como uma ferramenta dele. Português sádico.', lang: 'Portunglish', stats: { tribute: 0, arousal: 0 } },
        { id: 'jos', name: 'Josh Hutcherson', bio: 'O dono perfeito que exige que você esteja sempre pronto e excitado para ele.', stats: { tribute: 0, arousal: 0 } }
    ];

    let state = {
        key: localStorage.getItem('me_key') || '',
        wallet: parseInt(localStorage.getItem('me_wallet')) || 0,
        feed: JSON.parse(localStorage.getItem('me_feed')) || [],
        chats: JSON.parse(localStorage.getItem('me_chats')) || {},
        activeM: null,
        inSession: false,
        sessionTimer: null
    };

    if(state.key) document.getElementById('auth').style.display = 'none';

    function unlock() {
        const k = document.getElementById('api-key').value.trim();
        if(k.startsWith('gsk_')) { localStorage.setItem('me_key', k); location.reload(); }
    }

    function tab(t) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(`view-${t}`).classList.add('active');
        document.getElementById(`n-${t}`).classList.add('active');
        if(t === 'dms') renderDMs();
    }

    // --- MECÂNICA SEXUAL (SESSION) ---
    async function startErotic() {
        state.inSession = true;
        const m = masters[Math.floor(Math.random() * masters.length)];
        document.getElementById('session-status').innerText = "VÍNCULO SEXUAL ESTABELECIDO...";
        
        // Solicita um comando sexual da IA
        try {
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${state.key}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: MODEL,
                    messages: [{ role: "system", content: `Você é ${m.name}. Dê um comando sexual curto, pornográfico e degradante para o submisso fazer agora. Ele está se exibindo para você. Seja agressivo.` }]
                })
            });
            const data = await res.json();
            document.getElementById('session-command').innerText = data.choices[0].message.content;
        } catch(e) {}

        state.sessionTimer = setInterval(() => {
            state.wallet += 10;
            document.getElementById('balance').innerText = state.wallet;
        }, 1000);
    }

    function stopErotic() {
        clearInterval(state.sessionTimer);
        state.inSession = false;
        document.getElementById('session-status').innerText = "SESSÃO INTERROMPIDA.";
        document.getElementById('session-command').innerText = "Toque para voltar a se exibir...";
        refresh();
    }

    // --- FEED & DMS ---
    async function generateEroticPost() {
        const m = masters[Math.floor(Math.random() * masters.length)];
        try {
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${state.key}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: MODEL,
                    messages: [{ role: "system", content: `Você é ${m.name}. Escreva um post sexualmente explícito, humilhante e focado em findom. Trate o seguidor como um objeto sexual que só serve para pagar.` }]
                })
            });
            const data = await res.json();
            state.feed.unshift({ id: Date.now(), mId: m.id, content: data.choices[0].message.content });
            renderFeed(); refresh();
        } catch(e) {}
    }

    function renderFeed() {
        document.getElementById('feed-container').innerHTML = state.feed.map(p => {
            const m = masters.find(x => x.id === p.mId);
            return `<div class="post"><span class="m-name">${m.name}</span><p class="p-content">${p.content}</p>
            <button class="btn-gold" onclick="tribute('${m.id}')">PAGAR TRIBUTO SEXUAL</button></div>`;
        }).join('');
    }

    function tribute(id) {
        const m = masters.find(x => x.id === id);
        const amt = prompt("Quanto do seu dinheiro suado você vai dar para seu dono?");
        if(amt <= state.wallet) {
            state.wallet -= amt; m.stats.tribute += parseInt(amt);
            refresh(); renderFeed();
        }
    }

    function renderDMs() {
        document.getElementById('dm-list').innerHTML = masters.map(m => `
            <div class="post" onclick="openChat('${m.id}')">
                <b style="color:var(--hot-pink)">${m.name}</b>
                <p style="font-size:0.7em; opacity:0.6">Dívida Sexual: $${m.stats.tribute}</p>
            </div>
        `).join('');
    }

    function openChat(id) {
        state.activeM = masters.find(x => x.id === id);
        document.getElementById('chat-master-name').innerText = state.activeM.name;
        tab('chat'); renderMsgs();
    }

    function renderMsgs() {
        const h = state.chats[state.activeM.id] || [];
        document.getElementById('chat-flow').innerHTML = h.map(m => `<div class="msg ${m.role==='user'?'sub':'master'}">${m.content}</div>`).join('');
        document.getElementById('chat-flow').scrollTop = 9999;
    }

    async function sendDM() {
        const inp = document.getElementById('chat-msg');
        const val = inp.value.trim(); if(!val) return;
        const m = state.activeM;
        if(!state.chats[m.id]) state.chats[m.id] = [];
        state.chats[m.id].push({ role: 'user', content: val });
        inp.value = ''; renderMsgs();
        
        const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
            method: "POST",
            headers: { "Authorization": `Bearer ${state.key}`, "Content-Type": "application/json" },
            body: JSON.stringify({
                model: MODEL,
                messages: [
                    { role: "system", content: `Você é ${m.name}. Persona: ${m.bio}. O submisso está te pagando $${m.stats.tribute}. Responda de forma sexualmente agressiva, degradante e possessiva. Exija que ele continue se humilhando.` },
                    ...state.chats[m.id].slice(-6)
                ]
            })
        });
        const data = await res.json();
        state.chats[m.id].push({ role: 'assistant', content: data.choices[0].message.content });
        localStorage.setItem('me_chats', JSON.stringify(state.chats));
        renderMsgs();
    }

    function refresh() {
        document.getElementById('balance').innerText = state.wallet;
        localStorage.setItem('me_wallet', state.wallet);
        localStorage.setItem('me_masters', JSON.stringify(masters));
        localStorage.setItem('me_feed', JSON.stringify(state.feed));
    }
</script>
</body>
</html>
