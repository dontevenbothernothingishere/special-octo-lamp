<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MASC - Master Social Pro</title>
    <style>
        :root { --gold: #d4af37; --bg: #050505; --card: #111; --text: #fafafa; --gray: #777; --border: #222; --red: #ff3333; --green: #2ecc71; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); padding-bottom: 90px; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }

        /* Vault Overlay */
        #vault-overlay { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; text-align: center; }
        .vault-input { background: #111; border: 1px solid var(--gold); color: white; padding: 15px; width: 100%; max-width: 350px; margin: 20px 0; border-radius: 12px; font-size: 16px; text-align: center; }

        /* UI Shell */
        header { background: rgba(0,0,0,0.95); backdrop-filter: blur(20px); padding: 15px; position: sticky; top: 0; border-bottom: 1px solid var(--border); z-index: 1000; display: flex; justify-content: space-between; align-items: center; }
        .wallet-display { color: var(--gold); font-weight: 900; font-size: 1.1em; display: flex; align-items: center; gap: 5px; }
        .view { display: none; padding: 15px; max-width: 600px; margin: 0 auto; animation: slideIn 0.2s ease-out; }
        .view.active { display: block; }
        @keyframes slideIn { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* Post Styles */
        .post { background: var(--card); border-radius: 16px; padding: 16px; margin-bottom: 20px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .post-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
        .m-name { color: var(--gold); font-weight: 800; font-size: 1.1em; display: block; }
        .m-handle { color: var(--gray); font-size: 0.85em; }
        .post-content { font-size: 1.05em; line-height: 1.5; margin-bottom: 15px; }
        .post-actions { display: flex; gap: 20px; border-top: 1px solid #222; padding-top: 12px; }
        .action-item { color: var(--gray); font-size: 0.9em; display: flex; align-items: center; gap: 5px; cursor: pointer; }
        .action-item.liked { color: var(--red); }

        /* Comments */
        .comment-section { margin-top: 12px; background: #0a0a0a; border-radius: 8px; padding: 10px; font-size: 0.9em; }
        .comment { margin-bottom: 8px; border-bottom: 1px solid #1a1a1a; padding-bottom: 5px; }
        .comment b { color: var(--gold); }

        /* Buttons */
        .btn-gold { background: var(--gold); color: #000; border: none; padding: 10px 20px; border-radius: 30px; font-weight: 900; font-size: 0.9em; cursor: pointer; }
        .btn-outline { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 8px 16px; border-radius: 30px; font-weight: bold; cursor: pointer; font-size: 0.8em; }

        /* Earn / Search Tab */
        .earn-container { text-align: center; padding: 40px 20px; }
        .scavenge-box { border: 2px dashed var(--gold); padding: 40px; border-radius: 20px; margin-top: 20px; transition: 0.3s; }
        .scavenge-box:active { background: rgba(212, 175, 55, 0.1); }

        /* Chat */
        #chat-window { height: 65vh; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; padding: 15px; }
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 20px; font-size: 1em; line-height: 1.4; }
        .msg.master { background: #1a1a1a; align-self: flex-start; border: 1px solid #333; color: #fff; }
        .msg.sub { background: var(--gold); color: #000; align-self: flex-end; font-weight: 600; }
        .chat-input-row { position: fixed; bottom: 80px; width: 100%; left: 0; background: #000; padding: 15px; display: flex; gap: 10px; border-top: 1px solid var(--border); }
        .chat-input-row input { flex: 1; background: #111; border: 1px solid #333; color: white; padding: 12px; border-radius: 25px; outline: none; }

        /* Nav */
        nav { position: fixed; bottom: 0; width: 100%; background: #000; border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 15px 0; z-index: 1000; }
        .nav-btn { color: var(--gray); font-size: 1.5em; cursor: pointer; transition: 0.2s; }
        .nav-btn.active { color: var(--gold); transform: translateY(-3px); }

        /* Utils */
        .loading-spin { animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); background: var(--gold); color: black; padding: 10px 20px; border-radius: 20px; font-weight: bold; z-index: 10000; display: none; }
    </style>
</head>
<body>

<div id="vault-overlay">
    <h1 style="color:var(--gold); letter-spacing: 5px;">MASC PRO</h1>
    <p style="color:var(--gray); margin-top: 10px;">Llama-3.3-70b-Versatile Engine Active</p>
    <input type="password" id="api-key" class="vault-input" placeholder="Paste Groq Key...">
    <button class="btn-gold" style="width: 240px; height: 50px;" onclick="unlock()">INITIALIZE</button>
</div>

<div class="toast" id="toast"></div>

<header>
    <div style="font-weight: 900; letter-spacing: 2px;">MASC</div>
    <div class="wallet-display">💰 $<span id="balance">0</span></div>
</header>

<div id="view-home" class="view active">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
        <h2 style="font-size: 1.4em;">Feed</h2>
        <button class="btn-outline" onclick="generatePost()">+ New Post</button>
    </div>
    <div id="feed-container"></div>
</div>

<div id="view-search" class="view">
    <h2>Earn Fictional Cash</h2>
    <p style="color:var(--gray); margin-bottom: 20px;">Search the streets or work for the Masters.</p>
    
    <div class="scavenge-box" onclick="scavenge()">
        <div id="scavenge-text" style="font-size: 1.2em; font-weight: bold; color: var(--gold);">SEARCH FOR CASH</div>
        <div style="color:var(--gray); font-size: 0.8em; margin-top: 10px;">Tap to scavenge</div>
    </div>

    <h2 style="margin-top: 40px;">Search Masters</h2>
    <input type="text" id="m-search" class="vault-input" style="margin-bottom:10px;" placeholder="Search handles..." onkeyup="renderMasters()">
    <div id="master-results"></div>
</div>

<div id="view-dms" class="view">
    <h2 style="margin-bottom: 20px;">Direct Messages</h2>
    <div id="dm-list"></div>
</div>

<div id="view-chat" class="view" style="padding: 0; max-width: 100%;">
    <div style="padding: 15px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between;">
        <b id="chat-master-name" style="color:var(--gold)">Master</b>
        <button onclick="switchTab('dms')" style="background:none; color:white; border:none; font-size: 1.5em;">×</button>
    </div>
    <div id="chat-window"></div>
    <div class="chat-input-row">
        <input type="text" id="chat-input" placeholder="Say something...">
        <button class="btn-gold" onclick="sendDM()">Send</button>
    </div>
</div>

<nav>
    <span class="nav-btn active" id="n-home" onclick="switchTab('home')">🏠</span>
    <span class="nav-btn" id="n-search" onclick="switchTab('search')">🔍</span>
    <span class="nav-btn" id="n-dms" onclick="switchTab('dms')">💬</span>
    <span class="nav-btn" onclick="reset()">🔒</span>
</nav>

<script>
    const MODEL = "llama-3.3-70b-versatile";
    
    // THE MASTERS DATA
    let masters = JSON.parse(localStorage.getItem('masc_masters_v2')) || [
        { id: 'm1', name: 'Master Jax', handle: '@AlphaJax', bio: 'Alpha. Gym Rat. High Demands.', stats: { tribute: 0, count: 0, followed: false } },
        { id: 'm2', name: 'King Sterling', handle: '@RichSterling', bio: 'CEO. Wealthy. Only likes big numbers.', stats: { tribute: 0, count: 0, followed: false } },
        { id: 'm3', name: 'Master Colton', handle: '@ColtonDom', personality: 'Frat Bro. Mean. Arrogant.', stats: { tribute: 0, count: 0, followed: false } }
    ];

    let state = {
        key: localStorage.getItem('masc_key_v2') || '',
        wallet: parseInt(localStorage.getItem('masc_wallet_v2')) || 5000,
        feed: JSON.parse(localStorage.getItem('masc_feed_v2')) || [],
        chats: JSON.parse(localStorage.getItem('masc_chats_v2')) || {},
        likes: JSON.parse(localStorage.getItem('masc_likes_v2')) || [],
        activeM: null,
        scavengeTimer: 0
    };

    // INITIALIZE
    if (state.key) document.getElementById('vault-overlay').style.display = 'none';
    refreshUI();

    function unlock() {
        const k = document.getElementById('api-key').value.trim();
        if (k.startsWith('gsk_')) {
            state.key = k;
            localStorage.setItem('masc_key_v2', k);
            document.getElementById('vault-overlay').style.display = 'none';
            if(state.feed.length === 0) generatePost();
        }
    }

    function switchTab(t) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('active'));
        document.getElementById(`view-${t}`).classList.add('active');
        if(t !== 'chat') document.getElementById(`n-${t}`).classList.add('active');
        if(t === 'home') renderFeed();
        if(t === 'search') renderMasters();
        if(t === 'dms') renderDMList();
    }

    function refreshUI() {
        document.getElementById('balance').innerText = state.wallet.toLocaleString();
        localStorage.setItem('masc_wallet_v2', state.wallet);
        localStorage.setItem('masc_masters_v2', JSON.stringify(masters));
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 3000);
    }

    // --- EARN MONEY SYSTEM ---
    function scavenge() {
        if (Date.now() < state.scavengeTimer) {
            alert("Exhausted. Wait a few seconds.");
            return;
        }
        const find = Math.floor(Math.random() * 500) + 100;
        state.wallet += find;
        state.scavengeTimer = Date.now() + 5000;
        showToast(`Found $${find} in a lost wallet!`);
        refreshUI();
        
        const txt = document.getElementById('scavenge-text');
        txt.innerText = "COOLING DOWN...";
        setTimeout(() => txt.innerText = "SEARCH FOR CASH", 5000);
    }

    // --- SOCIAL SYSTEM ---
    function toggleFollow(id) {
        const m = masters.find(x => x.id === id);
        m.stats.followed = !m.stats.followed;
        refreshUI();
        renderMasters();
        renderFeed();
    }

    function toggleLike(postId) {
        if(state.likes.includes(postId)) state.likes = state.likes.filter(x => x !== postId);
        else state.likes.push(postId);
        localStorage.setItem('masc_likes_v2', JSON.stringify(state.likes));
        renderFeed();
    }

    async function generatePost() {
        if(!state.key) return;
        const m = masters[Math.floor(Math.random() * masters.length)];
        showToast("Master is writing...");

        try {
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${state.key}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: MODEL,
                    messages: [
                        { role: "system", content: `You are ${m.name} (${m.handle}). Personality: ${m.bio}. You are a gay male findom. Write a very short, demanding post for your followers asking for fictional money.` }
                    ]
                })
            });
            const data = await res.json();
            const post = {
                id: Date.now(),
                masterId: m.id,
                content: data.choices[0].message.content,
                comments: []
            };
            state.feed.unshift(post);
            localStorage.setItem('masc_feed_v2', JSON.stringify(state.feed.slice(0, 20)));
            renderFeed();
        } catch (e) { console.error(e); }
    }

    function renderFeed() {
        const container = document.getElementById('feed-container');
        container.innerHTML = state.feed.map(p => {
            const m = masters.find(x => x.id === p.masterId);
            const isLiked = state.likes.includes(p.id);
            return `
                <div class="post">
                    <div class="post-header">
                        <div><span class="m-name">${m.name}</span><span class="m-handle">${m.handle}</span></div>
                        <button class="btn-outline" onclick="toggleFollow('${m.id}')">${m.stats.followed ? 'Following' : 'Follow'}</button>
                    </div>
                    <div class="post-content">${p.content}</div>
                    <div class="post-actions">
                        <div class="action-item ${isLiked?'liked':''}" onclick="toggleLike(${p.id})">❤️ ${isLiked?'Liked':'Like'}</div>
                        <div class="action-item" onclick="addComment(${p.id})">💬 Comment</div>
                        <div class="btn-gold" style="margin-left:auto; padding:5px 15px;" onclick="tribute('${m.id}')">Tribute</div>
                    </div>
                    <div class="comment-section" id="comments-${p.id}">
                        ${p.comments.map(c => `<div class="comment"><b>${c.user}:</b> ${c.text}</div>`).join('')}
                    </div>
                </div>
            `;
        }).join('');
    }

    function renderMasters() {
        const q = document.getElementById('m-search').value.toLowerCase();
        const res = document.getElementById('master-results');
        res.innerHTML = masters.filter(m => m.name.toLowerCase().includes(q) || m.handle.toLowerCase().includes(q))
            .map(m => `
                <div class="post" style="display:flex; justify-content:space-between; align-items:center;">
                    <div><b style="color:var(--gold)">${m.name}</b><br><small>${m.stats.followed ? 'Following' : 'Not Following'}</small></div>
                    <button class="btn-outline" onclick="toggleFollow('${m.id}')">${m.stats.followed ? 'Unfollow' : 'Follow'}</button>
                </div>
            `).join('');
    }

    // --- TRIBUTE & AI MEMORY ---
    function tribute(mId) {
        const m = masters.find(x => x.id === mId);
        const amt = prompt(`How much fictional cash for ${m.name}?`);
        if(!amt || isNaN(amt) || amt <= 0) return;
        
        if(state.wallet >= amt) {
            state.wallet -= parseInt(amt);
            m.stats.tribute += parseInt(amt);
            m.stats.count += 1;
            refreshUI();
            showToast(`Tribute of $${amt} accepted by ${m.name}.`);
        } else {
            alert("Go scavenge more money, broke boy.");
        }
    }

    async function addComment(postId) {
        const text = prompt("Write your comment...");
        if(!text) return;
        
        const post = state.feed.find(x => x.id === postId);
        const m = masters.find(x => x.id === post.masterId);
        post.comments.push({ user: 'You', text: text });
        renderFeed();

        // AI Response Logic
        try {
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${state.key}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: MODEL,
                    messages: [
                        { role: "system", content: `You are ${m.name}. User Stats with you: Total Donated: $${m.stats.tribute}, Times Donated: ${m.stats.count}. Decide if you want to reply meanly or ignore them. If you reply, keep it under 15 words.` },
                        { role: "user", content: `I commented on your post: "${text}"` }
                    ]
                })
            });
            const data = await res.json();
            const reply = data.choices[0].message.content;
            if(reply.length > 5) {
                post.comments.push({ user: m.name, text: reply });
                renderFeed();
            }
        } catch (e) { console.error(e); }
    }

    // --- DM SYSTEM ---
    function renderDMList() {
        const container = document.getElementById('dm-list');
        const followed = masters.filter(m => m.stats.followed);
        if(followed.length === 0) {
            container.innerHTML = "<p style='color:var(--gray)'>Follow masters to start DMs.</p>";
            return;
        }
        container.innerHTML = followed.map(m => `
            <div class="post" onclick="openChat('${m.id}')" style="cursor:pointer;">
                <b style="color:var(--gold)">${m.name}</b>
                <p style="font-size:0.8em; color:var(--gray)">Tribute Balance: $${m.stats.tribute}</p>
            </div>
        `).join('');
    }

    function openChat(id) {
        state.activeM = masters.find(x => x.id === id);
        document.getElementById('chat-master-name').innerText = state.activeM.name;
        switchTab('chat');
        renderMsgs();
    }

    function renderMsgs() {
        const h = state.chats[state.activeM.id] || [];
        const win = document.getElementById('chat-window');
        win.innerHTML = h.map(m => `<div class="msg ${m.role==='user'?'sub':'master'}">${m.content}</div>`).join('');
        win.scrollTop = win.scrollHeight;
    }

    async function sendDM() {
        const inp = document.getElementById('chat-input');
        const val = inp.value.trim();
        if(!val) return;

        if(!state.chats[state.activeM.id]) state.chats[state.activeM.id] = [];
        state.chats[state.activeM.id].push({ role: 'user', content: val });
        inp.value = '';
        renderMsgs();

        try {
            const m = state.activeM;
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${state.key}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: MODEL,
                    messages: [
                        { role: "system", content: `You are ${m.name}. Persona: ${m.bio}. User Stats: Total Tribute $${m.stats.tribute}, Count ${m.stats.count}. You are a gay male findom talking to a sub in DMs. Be demanding and short.` },
                        ...state.chats[m.id].slice(-6)
                    ]
                })
            });
            const data = await res.json();
            state.chats[m.id].push({ role: 'assistant', content: data.choices[0].message.content });
            localStorage.setItem('masc_chats_v2', JSON.stringify(state.chats));
            renderMsgs();
        } catch (e) { alert("API Error."); }
    }

    function reset() {
        if(confirm("Log out? This deletes your API key from this device.")) {
            localStorage.removeItem('masc_key_v2');
            location.reload();
        }
    }
</script>
</body>
</html>
