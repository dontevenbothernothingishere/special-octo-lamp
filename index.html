<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MASC - Cash Master Social</title>
    <style>
        :root { --gold: #d4af37; --bg: #050505; --card: #121212; --text: #f0f0f0; --gray: #666; --border: #222; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background: var(--bg); color: var(--text); padding-bottom: 70px; }

        /* Security Vault */
        #vault-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        .vault-input { background: #111; border: 1px solid var(--gold); color: white; padding: 15px; width: 100%; max-width: 300px; margin: 20px 0; border-radius: 8px; }
        
        /* Layout */
        header { background: rgba(5,5,5,0.9); backdrop-filter: blur(10px); padding: 15px; position: sticky; top: 0; border-bottom: 1px solid var(--border); z-index: 100; display: flex; justify-content: space-between; align-items: center; }
        .wallet { color: var(--gold); font-weight: bold; font-size: 1.1em; }
        .view { display: none; padding: 10px; max-width: 600px; margin: 0 auto; }
        .view.active { display: block; }

        /* Feed & Posts */
        .post { background: var(--card); margin-bottom: 15px; padding: 15px; border-radius: 10px; border: 1px solid var(--border); }
        .post-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .post-author { font-weight: bold; color: var(--gold); }
        .post-handle { color: var(--gray); font-size: 0.9em; font-weight: normal; }
        .post-actions { display: flex; gap: 15px; margin-top: 15px; border-top: 1px solid var(--border); padding-top: 10px; }
        .action-btn { background: none; border: none; color: var(--gray); font-size: 1em; cursor: pointer; display: flex; align-items: center; gap: 5px; }
        .action-btn.active-like { color: #e0245e; }
        .btn-tribute { background: var(--gold); color: black; border: none; padding: 5px 15px; border-radius: 20px; font-weight: bold; cursor: pointer; }
        .btn-follow { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 5px 15px; border-radius: 20px; cursor: pointer; }
        .btn-follow.following { background: var(--gold); color: black; }

        /* Search */
        .search-bar { width: 100%; padding: 15px; background: var(--card); border: 1px solid var(--border); color: white; border-radius: 10px; margin-bottom: 15px; }
        .profile-card { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: var(--card); border-bottom: 1px solid var(--border); }

        /* DMs */
        .dm-list-item { padding: 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; cursor: pointer; }
        #chat-view { display: flex; flex-direction: column; height: calc(100vh - 130px); }
        .chat-history { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 10px 15px; border-radius: 15px; line-height: 1.4; }
        .msg.master { background: #222; align-self: flex-start; border-left: 2px solid var(--gold); }
        .msg.sub { background: var(--gold); color: black; align-self: flex-end; }
        .chat-input-area { display: flex; gap: 10px; padding: 10px; background: var(--card); border-top: 1px solid var(--border); }
        .chat-input-area input { flex: 1; background: #111; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 20px; }

        /* Navbar */
        nav { position: fixed; bottom: 0; width: 100%; background: var(--bg); border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 15px 0; z-index: 100; }
        .nav-item { color: var(--gray); font-size: 1.5em; text-decoration: none; cursor: pointer; }
        .nav-item.active { color: var(--gold); }

        /* Notifications */
        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--gold); color: black; padding: 10px 20px; border-radius: 20px; font-weight: bold; z-index: 1000; display: none; }
    </style>
</head>
<body>

<div id="vault-overlay">
    <h1 style="color:var(--gold); margin-bottom: 10px;">MASC VAULT</h1>
    <p style="color:var(--gray)">Enter your Groq API Key to initialize the Masters. Stored locally, never uploaded.</p>
    <input type="password" id="api-key" class="vault-input" placeholder="gsk_...">
    <button class="btn-tribute" style="padding: 15px 30px; font-size: 1.1em;" onclick="unlockVault()">Authenticate</button>
</div>

<div class="toast" id="toast">Notification</div>

<header>
    <span style="font-weight: 900; letter-spacing: 1px;">MASC</span>
    <span class="wallet">💰 $<span id="wallet-balance">10,000</span></span>
</header>

<div id="view-home" class="view active">
    </div>

<div id="view-search" class="view">
    <input type="text" class="search-bar" id="search-input" placeholder="Search for Masters..." onkeyup="renderSearch()">
    <div id="search-results"></div>
</div>

<div id="view-dms" class="view">
    <h2 style="margin-bottom: 15px; color: var(--gold);">Your Masters</h2>
    <div id="dm-list"></div>
</div>

<div id="view-chat" class="view" style="padding: 0; max-width: 100%;">
    <div style="padding: 15px; background: var(--card); border-bottom: 1px solid var(--border);">
        <b id="chat-title" style="color:var(--gold)">Master</b>
        <button onclick="switchTab('dms')" style="float:right; background:none; color:white; border:none;">Close</button>
    </div>
    <div id="chat-view">
        <div class="chat-history" id="chat-history"></div>
        <div class="chat-input-area">
            <input type="text" id="chat-input" placeholder="Submit to your Master...">
            <button class="btn-tribute" onclick="sendMsg()">Send</button>
        </div>
    </div>
</div>

<nav>
    <span class="nav-item active" onclick="switchTab('home')">🏠</span>
    <span class="nav-item" onclick="switchTab('search')">🔍</span>
    <span class="nav-item" onclick="switchTab('dms')">💬</span>
</nav>

<script>
    // --- DATABASE (Fictional Masters & Posts) ---
    const masters = [
        { id: 'm1', name: 'Master Jax', handle: '@AlphaJax', bio: 'Gym rat. Demanding. Pay the muscle tax.' },
        { id: 'm2', name: 'King Sterling', handle: '@RichSterling', bio: 'CEO. If you aren\'t funding my coffee, you\'re useless.' },
        { id: 'm3', name: 'Dom Marcus', handle: '@DomMarcus', bio: 'Frat bro. Send beer money or get blocked loser.' }
    ];

    const posts = [
        { id: 'p1', authorId: 'm1', content: 'Pre-workout is empty. Which one of you little boys is paying for the next tub? $80 minimum.', price: 80 },
        { id: 'p2', authorId: 'm2', content: 'Just booked first class to Milan. Need some pocket change from my subs. $500 tribute now.', price: 500 },
        { id: 'p3', authorId: 'm3', content: 'Bored. Entertain me with cash. First one to send $50 gets a reply in the DMs.', price: 50 },
        { id: 'p4', authorId: 'm1', content: 'Just finished a heavy lift. My muscles are huge and your wallet is about to be empty. Pay up.', price: 150 }
    ];

    // --- STATE MANAGEMENT ---
    let state = {
        key: localStorage.getItem('masc_key') || '',
        wallet: parseInt(localStorage.getItem('masc_wallet')) || 10000,
        likes: JSON.parse(localStorage.getItem('masc_likes')) || [],
        follows: JSON.parse(localStorage.getItem('masc_follows')) || [],
        chats: JSON.parse(localStorage.getItem('masc_chats')) || {},
        activeChat: null
    };

    // --- INITIALIZATION ---
    if (state.key) document.getElementById('vault-overlay').style.display = 'none';
    updateWallet(0); // init render
    renderFeed();
    renderDMList();
    startRandomAITaunts();

    function unlockVault() {
        const key = document.getElementById('api-key').value.trim();
        if (key.startsWith('gsk_')) {
            localStorage.setItem('masc_key', key);
            state.key = key;
            document.getElementById('vault-overlay').style.display = 'none';
            showToast("Vault Unlocked.");
        } else {
            alert("Invalid Groq Key.");
        }
    }

    // --- CORE LOGIC ---
    function switchTab(tabId) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(`view-${tabId}`).classList.add('active');
        
        if(tabId !== 'chat') {
            event.currentTarget.classList.add('active');
        }
        
        if (tabId === 'search') renderSearch();
        if (tabId === 'dms') renderDMList();
        window.scrollTo(0, 0);
    }

    function updateWallet(amount) {
        state.wallet += amount;
        localStorage.setItem('masc_wallet', state.wallet);
        document.getElementById('wallet-balance').innerText = state.wallet.toLocaleString();
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 3000);
    }

    // --- INTERACTIONS ---
    function sendTribute(amount, masterName) {
        if (state.wallet >= amount) {
            updateWallet(-amount);
            showToast(`Sent $${amount} to ${masterName}`);
        } else {
            alert("Insufficient fictional funds! You're broke.");
        }
    }

    function toggleLike(postId) {
        if (state.likes.includes(postId)) {
            state.likes = state.likes.filter(id => id !== postId);
        } else {
            state.likes.push(postId);
        }
        localStorage.setItem('masc_likes', JSON.stringify(state.likes));
        renderFeed();
    }

    function toggleFollow(masterId) {
        if (state.follows.includes(masterId)) {
            state.follows = state.follows.filter(id => id !== masterId);
        } else {
            state.follows.push(masterId);
        }
        localStorage.setItem('masc_follows', JSON.stringify(state.follows));
        renderFeed();
        renderSearch();
        renderDMList();
    }

    // --- RENDERERS ---
    function renderFeed() {
        const html = posts.map(post => {
            const master = masters.find(m => m.id === post.authorId);
            const isLiked = state.likes.includes(post.id);
            const isFollowing = state.follows.includes(master.id);
            return `
                <div class="post">
                    <div class="post-header">
                        <div>
                            <span class="post-author">${master.name}</span>
                            <span class="post-handle">${master.handle}</span>
                        </div>
                        <button class="btn-follow ${isFollowing ? 'following' : ''}" onclick="toggleFollow('${master.id}')">
                            ${isFollowing ? 'Following' : 'Follow'}
                        </button>
                    </div>
                    <div style="margin: 10px 0; line-height: 1.4;">${post.content}</div>
                    <div class="post-actions">
                        <button class="action-btn ${isLiked ? 'active-like' : ''}" onclick="toggleLike('${post.id}')">
                            ${isLiked ? '❤️ Liked' : '🤍 Like'}
                        </button>
                        <button class="action-btn" onclick="openChat('${master.id}')">💬 DM</button>
                        <button class="btn-tribute" style="margin-left: auto;" onclick="sendTribute(${post.price}, '${master.name}')">
                            Tribute $${post.price}
                        </button>
                    </div>
                </div>
            `;
        }).join('');
        document.getElementById('view-home').innerHTML = html;
    }

    function renderSearch() {
        const query = document.getElementById('search-input').value.toLowerCase();
        const html = masters.filter(m => m.name.toLowerCase().includes(query) || m.handle.toLowerCase().includes(query))
            .map(m => {
                const isFollowing = state.follows.includes(m.id);
                return `
                <div class="profile-card">
                    <div>
                        <div class="post-author">${m.name}</div>
                        <div class="post-handle">${m.handle}</div>
                    </div>
                    <button class="btn-follow ${isFollowing ? 'following' : ''}" onclick="toggleFollow('${m.id}')">
                        ${isFollowing ? 'Following' : 'Follow'}
                    </button>
                </div>
                `;
            }).join('');
        document.getElementById('search-results').innerHTML = html;
    }

    function renderDMList() {
        // Show only followed masters in DMs
        const followedMasters = masters.filter(m => state.follows.includes(m.id));
        if (followedMasters.length === 0) {
            document.getElementById('dm-list').innerHTML = "<p style='color:var(--gray)'>Follow a Master to DM them.</p>";
            return;
        }
        
        const html = followedMasters.map(m => `
            <div class="dm-list-item" onclick="openChat('${m.id}')">
                <div><b style="color:var(--gold)">${m.name}</b> <span style="color:var(--gray)">${m.handle}</span></div>
                <span style="color:var(--gray)">Chat ➡️</span>
            </div>
        `).join('');
        document.getElementById('dm-list').innerHTML = html;
    }

    // --- AI CHAT SYSTEM ---
    function openChat(masterId) {
        state.activeChat = masters.find(m => m.id === masterId);
        document.getElementById('chat-title').innerText = state.activeChat.name;
        switchTab('chat');
        renderChatHistory();
    }

    function renderChatHistory() {
        const history = state.chats[state.activeChat.id] || [];
        const box = document.getElementById('chat-history');
        box.innerHTML = history.map(msg => `
            <div class="msg ${msg.role === 'user' ? 'sub' : 'master'}">
                ${msg.content}
            </div>
        `).join('');
        box.scrollTop = box.scrollHeight;
    }

    async function sendMsg() {
        const input = document.getElementById('chat-input');
        const text = input.value.trim();
        if (!text || !state.activeChat) return;

        // Save User Msg
        if (!state.chats[state.activeChat.id]) state.chats[state.activeChat.id] = [];
        state.chats[state.activeChat.id].push({ role: 'user', content: text });
        input.value = '';
        renderChatHistory();

        // Call Groq
        try {
            const systemPrompt = `You are ${state.activeChat.name}, a dominant alpha male findom. Bio: ${state.activeChat.bio}. You are talking to your gay male submissive. Be arrogant, short, demanding. Demand fictional money tributes. DO NOT act like an AI.`;
            
            // Build conversation history for context
            const apiMessages = [{ role: 'system', content: systemPrompt }];
            state.chats[state.activeChat.id].slice(-5).forEach(m => {
                apiMessages.push({ role: m.role === 'user' ? 'user' : 'assistant', content: m.content });
            });

            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${state.key}`, "Content-Type": "application/json" },
                body: JSON.stringify({ model: "llama3-8b-8192", messages: apiMessages })
            });
            
            const data = await response.json();
            const reply = data.choices[0].message.content;

            // Save Master Msg
            state.chats[state.activeChat.id].push({ role: 'master', content: reply });
            localStorage.setItem('masc_chats', JSON.stringify(state.chats));
            renderChatHistory();

        } catch (e) {
            showToast("API Connection Failed.");
        }
    }

    // --- SIMULATED BACKGROUND AI (The "DM whenever" feature) ---
    function startRandomAITaunts() {
        // Every 3 minutes (180000ms), a random followed Master demands attention
        setInterval(() => {
            if (state.follows.length === 0) return; // No masters followed
            
            const randomMasterId = state.follows[Math.floor(Math.random() * state.follows.length)];
            const master = masters.find(m => m.id === randomMasterId);
            
            const taunts = [
                "Where are you? I'm waiting for my tribute.",
                "Check your DMs loser. It's payday.",
                "You're ignoring your Master? Send $100 now.",
                "Bored. Entertain my wallet."
            ];
            const randomTaunt = taunts[Math.floor(Math.random() * taunts.length)];

            // Save to chat history
            if (!state.chats[master.id]) state.chats[master.id] = [];
            state.chats[master.id].push({ role: 'master', content: randomTaunt });
            localStorage.setItem('masc_chats', JSON.stringify(state.chats));

            // Notify User
            showToast(`💬 New message from ${master.name}`);
            
            // If they are currently looking at that chat, update it
            if (state.activeChat && state.activeChat.id === master.id) {
                renderChatHistory();
            }
        }, 180000); 
    }
</script>
</body>
</html>
