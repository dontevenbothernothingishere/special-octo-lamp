<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MASC - Llama 70B Edition</title>
    <style>
        :root { --gold: #d4af37; --bg: #050505; --card: #121212; --text: #f0f0f0; --gray: #888; --border: #222; --red: #ff4444; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        body { background: var(--bg); color: var(--text); padding-bottom: 80px; overflow-x: hidden; }

        /* Security Vault */
        #vault-overlay { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; text-align: center; }
        .vault-input { background: #111; border: 1px solid var(--gold); color: white; padding: 15px; width: 100%; max-width: 350px; margin: 20px 0; border-radius: 12px; font-size: 16px; }
        
        /* Navigation & Header */
        header { background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); padding: 15px; position: sticky; top: 0; border-bottom: 1px solid var(--border); z-index: 100; display: flex; justify-content: space-between; align-items: center; }
        .wallet { color: var(--gold); font-weight: 900; font-size: 1.2em; text-shadow: 0 0 10px rgba(212,175,55,0.3); }
        
        .view { display: none; padding: 15px; max-width: 600px; margin: 0 auto; animation: fadeIn 0.3s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* UI Elements */
        .post { background: var(--card); margin-bottom: 20px; padding: 20px; border-radius: 15px; border: 1px solid var(--border); box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .master-name { color: var(--gold); font-weight: bold; font-size: 1.1em; }
        .handle { color: var(--gray); font-size: 0.9em; margin-left: 5px; }
        .content { margin: 15px 0; line-height: 1.5; font-size: 1.1em; }
        
        .btn-tribute { background: var(--gold); color: black; border: none; padding: 10px 20px; border-radius: 25px; font-weight: 800; cursor: pointer; transition: 0.2s; }
        .btn-tribute:active { transform: scale(0.95); }
        .btn-outline { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 8px 18px; border-radius: 25px; font-weight: bold; cursor: pointer; }

        /* DM Style */
        #chat-history { height: 60vh; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; padding: 10px; }
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 18px; line-height: 1.4; font-size: 1em; position: relative; }
        .msg.master { background: #1a1a1a; align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid #333; }
        .msg.sub { background: var(--gold); color: black; align-self: flex-end; border-bottom-right-radius: 2px; font-weight: 500; }
        
        .chat-input-area { display: flex; gap: 10px; padding: 15px; background: #000; border-top: 1px solid var(--border); position: fixed; bottom: 70px; width: 100%; left: 0; }
        .chat-input-area input { flex: 1; background: #111; border: 1px solid #333; color: white; padding: 12px 20px; border-radius: 30px; outline: none; }

        nav { position: fixed; bottom: 0; width: 100%; background: #000; border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 18px 0; z-index: 100; }
        .nav-item { color: var(--gray); font-size: 1.4em; cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: var(--gold); transform: translateY(-5px); }
        
        .status-dot { height: 8px; width: 8px; background: #31ff31; border-radius: 50%; display: inline-block; margin-right: 5px; box-shadow: 0 0 5px #31ff31; }
    </style>
</head>
<body>

<div id="vault-overlay">
    <h1 style="color:var(--gold); letter-spacing: 4px;">MASTER VAULT</h1>
    <p style="color:var(--gray); margin-top: 10px;">Security active. Key is stored locally on your device.</p>
    <input type="password" id="api-key" class="vault-input" placeholder="Enter Groq API Key...">
    <button class="btn-tribute" style="width: 200px;" onclick="unlockVault()">ACCESS MASC</button>
</div>

<header>
    <div>
        <span style="font-weight: 900; letter-spacing: 2px; font-size: 1.3em;">MASC</span>
        <div style="font-size: 0.7em; color: var(--gray);" id="model-status">MODEL: LLAMA-3.3-70B</div>
    </div>
    <div class="wallet" onclick="topUp()">💰 $<span id="wallet-balance">10,000</span></div>
</header>

<div id="view-home" class="view active">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
        <h2 style="font-size: 1.5em;">The Feed</h2>
        <button class="btn-outline" onclick="generatePost()">+ Generate Post</button>
    </div>
    <div id="feed-container"></div>
</div>

<div id="view-dms" class="view">
    <h2 style="margin-bottom: 20px;">Direct Messages</h2>
    <div id="dm-list"></div>
</div>

<div id="view-chat" class="view" style="padding: 0;">
    <div style="padding: 15px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between;">
        <div><span class="status-dot"></span> <b id="chat-master-name" style="color:var(--gold)">Master</b></div>
        <button onclick="switchTab('dms')" style="background:none; color:white; border:none; font-size: 1.5em;">×</button>
    </div>
    <div id="chat-history"></div>
    <div class="chat-input-area">
        <input type="text" id="chat-input" placeholder="Message your Master...">
        <button class="btn-tribute" onclick="sendChatMessage()">Send</button>
    </div>
</div>

<nav>
    <span class="nav-item active" id="nav-home" onclick="switchTab('home')">📱</span>
    <span class="nav-item" id="nav-dms" onclick="switchTab('dms')">💬</span>
    <span class="nav-item" onclick="resetApp()" style="color:var(--red); opacity:0.5;">🔒</span>
</nav>

<script>
    const MODEL_ID = "llama-3.3-70b-versatile";
    
    const masters = [
        { id: 'm1', name: 'Master Jax', handle: '@AlphaJax', personality: 'Aggressive, gym-focused, hyper-masculine, gym rat.' },
        { id: 'm2', name: 'King Sterling', handle: '@RichSterling', personality: 'Cold, wealthy, corporate CEO, high-status, demanding.' },
        { id: 'm3', name: 'Master Colton', handle: '@ColtonDom', personality: 'Frat bro, arrogant, playful but mean, college athlete vibe.' }
    ];

    let state = {
        key: localStorage.getItem('masc_key') || '',
        wallet: parseInt(localStorage.getItem('masc_wallet')) || 10000,
        feed: JSON.parse(localStorage.getItem('masc_feed')) || [],
        chats: JSON.parse(localStorage.getItem('masc_chats')) || {},
        activeMaster: null
    };

    if (state.key) document.getElementById('vault-overlay').style.display = 'none';
    updateUI();

    function unlockVault() {
        const key = document.getElementById('api-key').value.trim();
        if (key.startsWith('gsk_')) {
            localStorage.setItem('masc_key', key);
            state.key = key;
            document.getElementById('vault-overlay').style.display = 'none';
            if(state.feed.length === 0) generatePost();
        } else {
            alert("Invalid Key. Must start with gsk_");
        }
    }

    function switchTab(tab) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(`view-${tab}`).classList.add('active');
        if(tab !== 'chat') document.getElementById(`nav-${tab}`).classList.add('active');
        if(tab === 'home') renderFeed();
        if(tab === 'dms') renderDMList();
    }

    function updateUI() {
        document.getElementById('wallet-balance').innerText = state.wallet.toLocaleString();
    }

    function topUp() {
        if(confirm("Work a fictional shift to earn $5,000?")) {
            state.wallet += 5000;
            localStorage.setItem('masc_wallet', state.wallet);
            updateUI();
        }
    }

    async function generatePost() {
        const master = masters[Math.floor(Math.random() * masters.length)];
        const btn = event.target;
        if(btn) btn.innerText = "Posting...";

        try {
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${state.key}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: MODEL_ID,
                    messages: [
                        { role: "system", content: `You are ${master.name} (${master.handle}). ${master.personality} You are a gay male findom on a Twitter-like app. Focus on masculine dominance and demanding fictional money.` },
                        { role: "user", content: "Write a short, cocky post demanding a specific fictional dollar amount from your followers." }
                    ]
                })
            });
            const data = await res.json();
            const content = data.choices[0].message.content;
            
            state.feed.unshift({ id: Date.now(), masterId: master.id, content });
            localStorage.setItem('masc_feed', JSON.stringify(state.feed.slice(0, 15)));
            renderFeed();
        } catch (e) {
            alert("API Error. Check your key.");
        } finally {
            if(btn) btn.innerText = "+ Generate Post";
        }
    }

    function renderFeed() {
        const container = document.getElementById('feed-container');
        container.innerHTML = state.feed.map(post => {
            const master = masters.find(m => m.id === post.masterId);
            return `
                <div class="post">
                    <div class="post-header">
                        <div><span class="master-name">${master.name}</span><span class="handle">${master.handle}</span></div>
                    </div>
                    <div class="content">${post.content}</div>
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <button class="btn-outline" onclick="openChat('${master.id}')">DM Master</button>
                        <button class="btn-tribute" onclick="pay('${master.name}')">Tribute</button>
                    </div>
                </div>
            `;
        }).join('');
    }

    function pay(name) {
        const amt = prompt(`How much fictional tribute for ${name}?`);
        if(!amt || isNaN(amt)) return;
        if(state.wallet >= amt) {
            state.wallet -= parseInt(amt);
            localStorage.setItem('masc_wallet', state.wallet);
            updateUI();
            alert(`$${amt} sent. He better be worth it.`);
        } else {
            alert("Broke boy. Top up your wallet.");
        }
    }

    function renderDMList() {
        document.getElementById('dm-list').innerHTML = masters.map(m => `
            <div class="post" onclick="openChat('${m.id}')" style="cursor:pointer; display:flex; justify-content:space-between; align-items:center;">
                <div><b style="color:var(--gold)">${m.name}</b><br><small style="color:var(--gray)">Tap to grovel...</small></div>
                <span>➡️</span>
            </div>
        `).join('');
    }

    function openChat(id) {
        state.activeMaster = masters.find(m => m.id === id);
        document.getElementById('chat-master-name').innerText = state.activeMaster.name;
        switchTab('chat');
        renderMessages();
    }

    function renderMessages() {
        const history = state.chats[state.activeMaster.id] || [];
        const container = document.getElementById('chat-history');
        container.innerHTML = history.map(m => `
            <div class="msg ${m.role === 'user' ? 'sub' : 'master'}">${m.content}</div>
        `).join('');
        container.scrollTop = container.scrollHeight;
    }

    async function sendChatMessage() {
        const input = document.getElementById('chat-input');
        const text = input.value.trim();
        if(!text) return;

        if(!state.chats[state.activeMaster.id]) state.chats[state.activeMaster.id] = [];
        state.chats[state.activeMaster.id].push({ role: 'user', content: text });
        input.value = '';
        renderMessages();

        try {
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${state.key}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: MODEL_ID,
                    messages: [
                        { role: "system", content: `You are ${state.activeMaster.name}. ${state.activeMaster.personality} You are talking to your gay male submissive in DMs. You are arrogant, demanding, and want his fictional money. Keep replies under 3 sentences.` },
                        ...state.chats[state.activeMaster.id].slice(-5)
                    ]
                })
            });
            const data = await res.json();
            state.chats[state.activeMaster.id].push({ role: 'assistant', content: data.choices[0].message.content });
            localStorage.setItem('masc_chats', JSON.stringify(state.chats));
            renderMessages();
        } catch (e) {
            alert("Master is offline (API Error).");
        }
    }

    function resetApp() {
        if(confirm("Log out and lock vault? (Deletes Key from phone)")) {
            localStorage.removeItem('masc_key');
            location.reload();
        }
    }
</script>
</body>
</html>
